name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_verify:
    name: Lint, Typecheck, and Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Run Lint
        run: npm run lint

      - name: 🔎 Run Typecheck
        run: npm run typecheck

      - name: 🏗️ Build Application
        run: npm run build
        env:
          # Next.js 정적 빌드시 환경변수 참조 에러를 방지하기 위한 더미 값들
          # 빌드 환경에서만 쓰이며 실제 동작엔 관여하지 않음 (보안 안심)
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://dummy-project.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: dummy-anon-key
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SECRET_KEY: dummy-service-role-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
          ADMIN_OPS_TOKEN: dummy-ci-admin-token
